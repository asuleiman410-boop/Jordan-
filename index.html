<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>رفع العلم الأردني</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body style="text-align:center; font-family:Arial">

<h1>ارفع علم الأردن 🇯🇴</h1>

<img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Flag_of_Jordan.svg" width="200">

<h2 id="count">0</h2>

<button onclick="raiseFlag()">ارفع العلم</button>

<script>
  // 1) إعداد Firebase (حطي بيانات مشروعك هنا)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "YOUR_DATABASE_URL",
    projectId: "YOUR_PROJECT",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // 2) قراءة الرقم
  const counterRef = db.ref("flagCount");

  counterRef.on("value", (snapshot) => {
    document.getElementById("count").innerText = snapshot.val() || 0;
  });

  // 3) زيادة الرقم
  function raiseFlag() {
    counterRef.transaction((current) => {
      return (current || 0) + 1;
    });
  }
</script>

</body>
</html>
