<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رفع العلم الأردني LIVE</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  text-align:center;
  direction:rtl;
  color:white;

  background-image: url("https://images.unsplash.com/photo-1578926375605-eaf7559b1458?q=80&w=1200&auto=format&fit=crop");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height:100vh;
}

.overlay{
  background:rgba(0,0,0,0.45);
  min-height:100vh;
  padding:20px;
}

.card{
  margin-top:40px;
  width:380px;
  max-width:90%;
  margin-inline:auto;
  padding:30px;
  border-radius:24px;
  background:rgba(255,255,255,0.12);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  backdrop-filter:blur(12px);
}

h2{
  font-size:26px;
}

.counter{
  font-size:72px;
  font-weight:bold;
  margin:15px 0 5px;
}

#progressText{
  font-size:18px;
  margin-bottom:10px;
}

.scoreboard{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
}

.pole{
  width:10px;
  height:300px;
  background:white;
  margin:20px auto;
  position:relative;
  border-radius:5px;
}

.flag{
  width:85px;
  position:absolute;
  bottom:0;
  left:-38px;
  transition:1.5s ease;
}

button{
  padding:14px 28px;
  font-size:17px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  background:#ffcc00;
  font-weight:bold;
}

button:disabled{
  background:gray;
  cursor:not-allowed;
}
</style>
</head>

<body>

<div class="overlay">

<div class="card">

<h2>🇯🇴 ارفع علم الأردن معنا</h2>
<p>مدرسة أم ورقة الأنصارية الأساسية للبنات</p>

<div class="counter" id="count">0</div>
<div id="progressText">0 / 200</div>

<div class="scoreboard">
🏆 Scoreboard: <span id="score">0</span>
</div>

<div class="pole">
  <img id="flag" class="flag"
  src="https://upload.wikimedia.org/wikipedia/commons/c/c0/Flag_of_Jordan.svg">
</div>

<button id="btn" onclick="add()">إضافة مشاركة</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  databaseURL: "https://flag-77368-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("count");

const MAX = 200;
const maxHeight = 150;

// Live update
db.on("value", (snap) => {
  let count = snap.val() || 0;

  document.getElementById("count").innerText = count;
  document.getElementById("progressText").innerText = count + " / " + MAX;
  document.getElementById("score").innerText = count;

  let height = (count / MAX) * maxHeight;
  document.getElementById("flag").style.bottom = height + "px";

  if (count >= MAX) {
    document.getElementById("btn").disabled = true;
    document.getElementById("btn").innerText = "🏆 اكتمل رفع العلم";
  }
});

// زيادة
function add() {
  db.transaction((current) => {
    let value = current || 0;
    if (value >= MAX) return MAX;
    return value + 1;
  });
}
</script>

</body>
</html>
