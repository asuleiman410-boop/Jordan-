<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>رفع العلم الأردني</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to bottom, #000000 0%, #ffffff 50%, #007a3d 100%);
  }

  header {
    background: #c8102e;
    color: white;
    padding: 18px;
    font-size: 22px;
    font-weight: bold;
  }

  .container {
    margin-top: 20px;
    padding: 20px;
  }

  .counter {
    font-size: 22px;
    margin: 15px 0;
    font-weight: bold;
    color: #c8102e;
  }

  .progress-bar {
    width: 70%;
    height: 14px;
    background: rgba(255,255,255,0.4);
    margin: 10px auto 25px auto;
    border-radius: 20px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: #c8102e;
    transition: width 0.4s ease;
  }

  button {
    padding: 12px 24px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #c8102e;
    color: white;
    cursor: pointer;
  }

  button:disabled {
    background: gray;
  }

  .flagpole {
    width: 8px;
    height: 320px;
    background: #555;
    margin: 30px auto;
    position: relative;
    border-radius: 5px;
  }

  .flag {
    width: 150px;
    height: 80px;
    position: absolute;
    left: 8px;
    bottom: 0;
    transition: bottom 0.6s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    overflow: hidden;
  }

  .stripe-black { height: 33.33%; background: black; }
  .stripe-white { height: 33.33%; background: white; }
  .stripe-green { height: 33.33%; background: #007a3d; }

  /* ✔️ مثلث صحيح بدون أخطاء */
  .triangle {
    position: absolute;
    left: 0;
    top: 0;
    width: 65px;
    height: 80px;
  }

  .triangle::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;

    width: 0;
    height: 0;

    border-top: 40px solid transparent;
    border-bottom: 40px solid transparent;
    border-left: 65px solid #c8102e;
  }

  /* ✔️ النجمة ثابتة داخل المثلث */
  .star {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-45%, -50%);
    width: 18px;
    height: 18px;
    pointer-events: none;
  }

  .school-name {
    margin-top: 25px;
    font-size: 20px;
    font-weight: bold;
  }

  .committee {
    font-size: 18px;
    margin-top: 6px;
    color: #444;
  }
</style>
</head>

<body>

<header>🇯🇴 فعالية رفع العلم الأردني 🇯🇴</header>

<div class="container">

  <div class="counter">
    عدد المشاركات: <span id="count">0</span> / 1000
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>

  <button id="btn" onclick="raiseFlag()">شارك في رفع العلم</button>

  <div class="flagpole">
    <div class="flag" id="flag">

      <div class="stripe-black"></div>
      <div class="stripe-white"></div>
      <div class="stripe-green"></div>

      <div class="triangle">
        <svg class="star" viewBox="0 0 100 100">
          <polygon fill="white" points="
            50,5
            61,38
            95,38
            67,58
            78,91
            50,70
            22,91
            33,58
            5,38
            39,38
          "/>
        </svg>
      </div>

    </div>
  </div>

  <div class="school-name">
    مدرسة أم ورقة الأنصارية الأساسية للبنات
  </div>

  <div class="committee">
    لجنة النهوض الوطني
  </div>

</div>

<script>
let count = Number(localStorage.getItem("flagCount")) || 0;

const countEl = document.getElementById("count");
const flag = document.getElementById("flag");
const btn = document.getElementById("btn");
const progress = document.getElementById("progress");

function updateUI() {
  countEl.innerText = count;

  const maxHeight = 240;
  flag.style.bottom = (count / 1000) * maxHeight + "px";

  progress.style.width = (count / 1000) * 100 + "%";

  if (count >= 1000) {
    btn.disabled = true;
    btn.innerText = "اكتمل رفع العلم 🇯🇴";
  }
}

function raiseFlag() {
  if (count >= 1000) return;

  count++;
  localStorage.setItem("flagCount", count);
  updateUI();
}

updateUI();
</script>

</body>
</html>
