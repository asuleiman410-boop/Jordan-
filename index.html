<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رفع العلم الأردني LIVE</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  text-align:center;
  direction:rtl;
  min-height:100vh;

  background-image: url("https://images.unsplash.com/photo-1589395937772-6c7b5b9b1c1c?q=80&w=1600&auto=format&fit=crop");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* overlay */
.overlay{
  background:rgba(0,0,0,0.45);
  min-height:100vh;
  padding:20px;
}

/* card */
.card{
  margin-top:40px;
  width:400px;
  max-width:92%;
  margin-inline:auto;
  padding:30px;
  border-radius:24px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  box-shadow:0 8px 25px rgba(0,0,0,0.35);
}

/* 🎨 ألوان علم الأردن للنص */
.title{
  font-size:26px;
  font-weight:bold;
  background:linear-gradient(to right, red, white, black, green);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub1{
  font-size:18px;
  margin:0;
  color:#ffffff;
  text-shadow:0 1px 3px black;
}

.sub2{
  font-size:16px;
  margin-bottom:15px;
  color:#ffcc00;
}

/* counter */
.counter{
  font-size:70px;
  font-weight:bold;
  color:white;
}

/* progress */
#progressText{
  font-size:18px;
  color:#ffcc00;
  margin-bottom:15px;
}

.progress-container{
  width:100%;
  height:12px;
  background:rgba(255,255,255,0.25);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:20px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(to right, red, green);
  transition:1.2s ease;
}

/* pole */
.pole{
  width:10px;
  height:300px;
  background:white;
  margin:20px auto;
  position:relative;
  border-radius:5px;
}

.flag{
  width:85px;
  position:absolute;
  bottom:0;
  left:-38px;
  transition:1.2s ease;
}

/* buttons */
button{
  padding:14px 22px;
  font-size:16px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
}

.addBtn{
  background:#ffcc00;
}

.soundBtn{
  background:#1e88e5;
  color:white;
}

button:disabled{
  background:gray;
}

/* win screen */
#winScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:30px;
  z-index:999;
}
</style>
</head>

<body>

<!-- 🎵 الصوت -->
<audio id="anthem">
  <source src="jordan-anthem.mp3" type="audio/mpeg">
</audio>

<div class="overlay">

<div class="card">

<div class="title">🇯🇴 ارفع علم الأردن معنا</div>

<p class="sub1">مدرسة أم ورقة الأنصارية الأساسية للبنات - لواء ماركا</p>
<p class="sub2">لجنة النهوض الوطني</p>

<div class="counter" id="count">0</div>
<div id="progressText">0 / 500</div>

<div class="progress-container">
  <div class="progress-bar" id="bar"></div>
</div>

<div class="pole">
  <img id="flag" class="flag"
  src="https://upload.wikimedia.org/wikipedia/commons/c/c0/Flag_of_Jordan.svg">
</div>

<button class="addBtn" onclick="add()">➕ إضافة مشاركة</button>
<button class="soundBtn" onclick="playAnthem()">🎵 السلام الملكي</button>

</div>

</div>

<!-- 🏆 شاشة الإنجاز -->
<div id="winScreen">
🎉 مبروك! تم الوصول للهدف 🎉<br>
🇯🇴 فخر الأردن 🇯🇴
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const firebaseConfig = {
  databaseURL: "https://flag-77368-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("count");

const MAX = 500;
const maxHeight = 150;

let winTriggered = false;
let anthem = document.getElementById("anthem");

// 🎵 تشغيل الصوت
function playAnthem(){
  anthem.play().catch(()=> {
    alert("اضغطي مرة ثانية لتشغيل الصوت 🎵");
  });
}

db.on("value", (snap) => {
  let count = snap.val() || 0;

  document.getElementById("count").innerText = count;
  document.getElementById("progressText").innerText = count + " / " + MAX;

  let height = (count / MAX) * maxHeight;
  document.getElementById("flag").style.bottom = height + "px";

  let percent = (count / MAX) * 100;
  document.getElementById("bar").style.width = percent + "%";

  if (count >= MAX && !winTriggered) {
    winTriggered = true;

    document.getElementById("winScreen").style.display = "flex";
    document.querySelector(".addBtn").disabled = true;

    confetti({
      particleCount: 250,
      spread: 120,
      origin: { y: 0.6 }
    });
  }
});

// ➕ إضافة + تشغيل الصوت أول مرة
function add() {

  if (anthem.paused) {
    anthem.play().catch(()=>{});
  }

  db.transaction((current) => {
    let value = current || 0;
    if (value >= MAX) return MAX;
    return value + 1;
  });
}
</script>

</body>
</html>
