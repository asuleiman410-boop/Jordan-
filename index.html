<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رفع العلم LIVE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  direction: rtl;
  text-align: center;
  background: #f0f2f5;
}

.container {
  margin-top: 40px;
}

.title {
  font-size: 24px;
  margin-bottom: 10px;
}

.counter {
  font-size: 60px;
  font-weight: bold;
  margin: 20px 0;
}

.pole {
  width: 10px;
  height: 320px;
  background: #222;
  margin: auto;
  position: relative;
  border-radius: 5px;
}

.flag {
  width: 90px;
  position: absolute;
  bottom: 0;
  left: -40px;
  transition: 0.4s ease;
}

button {
  padding: 12px 20px;
  font-size: 16px;
  margin-top: 20px;
  cursor: pointer;
  border: none;
  border-radius: 10px;
  background: #28a745;
  color: white;
}

button:hover {
  background: #1e7e34;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🇯🇴 رفع العلم الأردني LIVE</div>

<p>مدرسة أم ورقة الأنصارية الأساسية للبنات</p>
<p>لجنة النهوض الوطني</p>

<div class="counter" id="count">0</div>

<div class="pole">
  <img id="flag" class="flag"
  src="https://upload.wikimedia.org/wikipedia/commons/c/c0/Flag_of_Jordan.svg">
</div>

<button onclick="add()">إضافة مشاركة</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // 🔴 ضعي رابط Firebase هنا
  const firebaseConfig = {
    https://jordan-flag-default-rtdb.asia-southeast1.firebasedatabase.app/

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database().ref("count");

  // قراءة الرقم مباشرة (Live)
  db.on("value", (snapshot) => {
    let count = snapshot.val() || 0;

    document.getElementById("count").innerText = count;
    document.getElementById("flag").style.bottom = (count * 10) + "px";
  });

  // زيادة الرقم
  function add() {
    db.transaction(function(current) {
      return (current || 0) + 1;
    });
  }
</script>

</body>
</html>
