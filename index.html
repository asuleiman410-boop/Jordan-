<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رفع العلم الأردني</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg,#000,#fff,#007a3d,#ce1126);
    min-height: 100vh;
    padding: 20px;
  }

  h1 { margin: 10px 0 5px; }

  .sub {
    font-weight: bold;
    margin: 4px 0;
  }

  .stage {
    width: 160px;
    height: 340px;
    margin: 25px auto;
    position: relative;
  }

  .pole {
    width: 10px;
    height: 100%;
    background: #555;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 6px;
  }

  #flag {
    width: 95px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;
    transition: bottom 0.25s ease;
  }

  #count {
    font-size: 34px;
    font-weight: bold;
    margin: 15px 0;
  }

  button {
    padding: 10px 18px;
    font-size: 18px;
    border: none;
    background: #c62828;
    color: white;
    border-radius: 8px;
    cursor: pointer;
  }

  .progress {
    width: 80%;
    height: 18px;
    margin: 20px auto;
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
  }

  #bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right,#000 25%,#fff 25% 50%,#007a3d 50% 75%,#ce1126 75%);
    transition: width 0.25s ease;
  }
</style>
</head>

<body>

<h1>ارفع العلم الأردني 🇯🇴</h1>

<div class="sub">لجنة النهوض الوطني</div>
<div class="sub">مدرسة أم ورقة الأنصارية</div>

<div class="stage">
  <div class="pole"></div>

  <img id="flag"
       src="https://flagcdn.com/w320/jo.png"
       alt="Jordan Flag">
</div>

<div id="count">0</div>

<div class="progress">
  <div id="bar"></div>
</div>

<button onclick="raiseFlag()">ارفع العلم</button>

<script>
  let count = 0;

  // ✅ الحد الجديد: 1000 فقط
  const max = 1000;

  const flag = document.getElementById("flag");
  const bar = document.getElementById("bar");
  const counter = document.getElementById("count");

  const poleHeight = 300;

  function raiseFlag() {
    if (count >= max) return;

    count++;

    counter.textContent = count;

    // رفع متناسب مع 1000
    let step = poleHeight / max;
    flag.style.bottom = (count * step) + "px";

    // الشريط يبقى طبيعي
    bar.style.width = (count / max) * 100 + "%";
  }
</script>

</body>
</html>
