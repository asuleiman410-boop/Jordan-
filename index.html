<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>رفع العلم الأردني</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to bottom, black, white, #007a3d);
}

header {
  background: #c8102e;
  color: white;
  padding: 18px;
  font-size: 22px;
  font-weight: bold;
}

.counter {
  font-size: 22px;
  margin: 15px;
  color: #c8102e;
  font-weight: bold;
}

.progress-bar {
  width: 70%;
  height: 14px;
  margin: 10px auto;
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.4);
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(to right, black, white, #007a3d, #c8102e);
}

button {
  padding: 12px 24px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #c8102e;
  color: white;
}

.flagpole {
  width: 8px;
  height: 320px;
  background: #555;
  margin: 30px auto;
  position: relative;
}

.flag {
  width: 150px;
  height: 80px;
  position: absolute;
  left: 8px;
  bottom: 0;
  transition: 0.6s;
  overflow: hidden;
}

/* ألوان العلم */
.stripe-black { height: 33.33%; background: black; }
.stripe-white { height: 33.33%; background: white; }
.stripe-green { height: 33.33%; background: #007a3d; }

/* ✔️ مثلث صحيح 100% */
.triangle {
  position: absolute;
  left: 0;
  top: 0;
  width: 0;
  height: 0;
  border-top: 40px solid transparent;
  border-bottom: 40px solid transparent;
  border-left: 65px solid #c8102e;
}

/* ✔️ نجمة ثابتة داخل المثلث */
.star {
  position: absolute;
  left: 18px;
  top: 18px;
  width: 18px;
  height: 18px;
}

/* نصوص */
.school-name {
  margin-top: 20px;
  font-weight: bold;
}

.committee {
  color: #444;
}
</style>
</head>

<body>

<header>🇯🇴 فعالية رفع العلم الأردني 🇯🇴</header>

<div class="counter">
عدد المشاركات: <span id="count">0</span> / 1000
</div>

<div class="progress-bar">
<div class="progress-fill" id="progress"></div>
</div>

<button onclick="raiseFlag()">شارك في رفع العلم</button>

<div class="flagpole">
  <div class="flag" id="flag">

    <div class="stripe-black"></div>
    <div class="stripe-white"></div>
    <div class="stripe-green"></div>

    <div class="triangle"></div>

    <svg class="star" viewBox="0 0 100 100">
      <polygon fill="white" points="
        50,5 61,38 95,38 67,58 78,91
        50,70 22,91 33,58 5,38 39,38
      "/>
    </svg>

  </div>
</div>

<div class="school-name">
مدرسة أم ورقة الأنصارية الأساسية للبنات
</div>

<div class="committee">
لجنة النهوض الوطني
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔴 حطي بياناتك هنا */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "flag", "counter");

const countEl = document.getElementById("count");
const flag = document.getElementById("flag");
const progress = document.getElementById("progress");

let localSafe = Number(localStorage.getItem("safeCount")) || 0;

/* تحديث العرض */
function updateUI(c) {
  countEl.innerText = c;
  flag.style.bottom = (c / 1000) * 240 + "px";
  progress.style.width = (c / 1000) * 100 + "%";
  localStorage.setItem("safeCount", c);
}

/* تحميل الرقم */
async function load() {
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, { count: localSafe });
    updateUI(localSafe);
  } else {
    updateUI(snap.data().count);
  }
}

/* رفع */
async function raiseFlag() {
  try {
    await updateDoc(ref, { count: increment(1) });
    load();
  } catch {
    localSafe++;
    updateUI(localSafe);
  }
}

window.raiseFlag = raiseFlag;

load();
</script>

</body>
</html>
