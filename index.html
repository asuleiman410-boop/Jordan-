<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رفع العلم الأردني LIVE</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  text-align:center;
  direction:rtl;
  color:white;

  /* 🏜️ خلفية البتراء المضمونة */
  background-image: url("https://images.unsplash.com/photo-1548013146-72479768bada?q=80&w=1600&auto=format&fit=crop");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height:100vh;
}

.overlay{
  background:rgba(0,0,0,0.35); /* خفيف حتى لا يغطي الخلفية */
  min-height:100vh;
  padding:20px;
}

.card{
  margin-top:40px;
  width:390px;
  max-width:92%;
  margin-inline:auto;
  padding:30px;
  border-radius:24px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  box-shadow:0 8px 25px rgba(0,0,0,0.35);
}

h2{font-size:26px;margin-bottom:5px;}

.sub1{font-size:18px;margin:0;}
.sub2{font-size:16px;opacity:0.9;margin-bottom:15px;}

.counter{
  font-size:70px;
  font-weight:bold;
  margin:10px 0;
}

#progressText{
  font-size:18px;
  margin-bottom:15px;
}

/* progress bar */
.progress-container{
  width:100%;
  height:12px;
  background:rgba(255,255,255,0.25);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:20px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#ffcc00;
  transition:1.2s ease;
}

/* pole */
.pole{
  width:10px;
  height:300px;
  background:white;
  margin:20px auto;
  position:relative;
  border-radius:5px;
}

.flag{
  width:85px;
  position:absolute;
  bottom:0;
  left:-38px;
  transition:1.2s ease;
}

/* button */
button{
  padding:14px 28px;
  font-size:17px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  background:#ffcc00;
  font-weight:bold;
}

button:disabled{
  background:gray;
  cursor:not-allowed;
}

/* win screen */
#winScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:30px;
  z-index:999;
}
</style>
</head>

<body>

<!-- 🎵 الموسيقى -->
<audio id="anthem">
  <source src="jordan-anthem.mp3" type="audio/mpeg">
</audio>

<div class="overlay">

<div class="card">

<h2>🇯🇴 ارفع علم الأردن معنا</h2>

<p class="sub1">مدرسة أم ورقة الأنصارية الأساسية للبنات - لواء ماركا</p>
<p class="sub2">لجنة النهوض الوطني</p>

<div class="counter" id="count">0</div>
<div id="progressText">0 / 200</div>

<div class="progress-container">
  <div class="progress-bar" id="bar"></div>
</div>

<div class="pole">
  <img id="flag" class="flag"
  src="https://upload.wikimedia.org/wikipedia/commons/c/c0/Flag_of_Jordan.svg">
</div>

<button id="btn" onclick="add()">إضافة مشاركة</button>

</div>
</div>

<!-- 🎉 شاشة الإنجاز -->
<div id="winScreen">
🎉 مبروك! تم الوصول للهدف 🎉<br>
🇯🇴 فخر الأردن 🇯🇴
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const firebaseConfig = {
  databaseURL: "https://flag-77368-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("count");

const MAX = 200;
const maxHeight = 150;

let winTriggered = false;

// 🔊 الصوت
const anthem = document.getElementById("anthem");

db.on("value", (snap) => {
  let count = snap.val() || 0;

  document.getElementById("count").innerText = count;
  document.getElementById("progressText").innerText = count + " / " + MAX;

  // رفع العلم
  let height = (count / MAX) * maxHeight;
  document.getElementById("flag").style.bottom = height + "px";

  // progress bar
  let percent = (count / MAX) * 100;
  document.getElementById("bar").style.width = percent + "%";

  // 🎯 عند الوصول للهدف
  if (count >= MAX && !winTriggered) {
    winTriggered = true;

    document.getElementById("btn").disabled = true;
    document.getElementById("btn").innerText = "🏆 اكتمل رفع العلم";

    // 🎉 كونفتي
    confetti({
      particleCount: 200,
      spread: 100,
      origin: { y: 0.6 }
    });

    // 🎵 تشغيل السلام الملكي
    anthem.play().catch(()=>{});

    // 🏆 شاشة الإنجاز
    document.getElementById("winScreen").style.display = "flex";
  }
});

// ➕ زيادة + تشغيل الصوت عند أول تفاعل (مهم للموبايل)
function add() {

  if (anthem.paused) {
    anthem.play().catch(()=>{});
  }

  db.transaction((current) => {
    let value = current || 0;
    if (value >= MAX) return MAX;
    return value + 1;
  });
}
</script>

</body>
</html>
