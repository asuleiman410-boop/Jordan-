<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رفع العلم الأردني</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
  }

  h1 {
    margin-bottom: 5px;
  }

  .sub {
    color: #444;
    margin: 5px 0;
  }

  /* السارية */
  .pole {
    width: 12px;
    height: 320px;
    background: #555;
    margin: 20px auto;
    position: relative;
    border-radius: 6px;
  }

  /* العلم */
  #flag {
    width: 110px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;
    transition: bottom 0.2s ease;
  }

  /* العداد */
  #count {
    font-size: 32px;
    margin: 15px 0;
  }

  /* زر */
  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    background: #c62828;
    color: white;
    border-radius: 8px;
  }

  /* شريط التحميل */
  .progress-container {
    width: 80%;
    height: 18px;
    background: #ddd;
    margin: 20px auto;
    border-radius: 10px;
    overflow: hidden;
  }

  #progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(
      to right,
      black 25%,
      white 25% 50%,
      green 50% 75%,
      red 75%
    );
    transition: width 0.2s ease;
  }
</style>
</head>

<body>

<h1>ارفع العلم الأردني 🇯🇴</h1>

<div class="sub">لجنة النهوض الوطني</div>
<div class="sub">مدرسة: ____________</div>

<div class="pole">
  <img id="flag" src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Flag_of_Jordan.svg">
</div>

<div id="count">0</div>

<div class="progress-container">
  <div id="progress"></div>
</div>

<button onclick="raiseFlag()">ارفع العلم</button>

<script>
  let count = 0;
  const max = 100;

  function raiseFlag() {
    if (count >= max) return;

    count++;

    // تحديث الرقم
    document.getElementById("count").innerText = count;

    // رفع العلم تدريجيًا
    document.getElementById("flag").style.bottom = (count * 3) + "px";

    // تحديث شريط التحميل
    document.getElementById("progress").style.width = count + "%";
  }
</script>

</body>
</html>
