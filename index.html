<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Raise the Flag</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  direction: rtl;
  text-align: center;
  background: linear-gradient(135deg, #1f4037, #99f2c8);
  color: white;
}

.container {
  margin-top: 40px;
}

.card {
  background: rgba(255,255,255,0.15);
  width: 340px;
  margin: auto;
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 5px;
}

.counter {
  font-size: 70px;
  font-weight: bold;
  margin: 20px 0;
  color: #fff;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

/* سارية العلم */
.pole {
  width: 10px;
  height: 320px;
  background: #222;
  margin: 20px auto;
  position: relative;
  border-radius: 5px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

/* العلم */
.flag {
  width: 85px;
  position: absolute;
  bottom: 0;
  left: -38px;
  transition: 0.6s cubic-bezier(0.25, 1, 0.5, 1);
  filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
}

button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: #ffcc00;
  color: black;
  font-weight: bold;
  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #ffdb4d;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>🇯🇴 رفع العلم الأردني</h2>

<p>مدرسة أم ورقة الأنصارية الأساسية للبنات</p>
<p>لجنة النهوض الوطني</p>

<div class="counter" id="count">0</div>

<div class="pole">
  <img id="flag" class="flag" src="https://upload.wikimedia.org/wikipedia/commons/c/c0/Flag_of_Jordan.svg">
</div>

<button onclick="add()">إضافة مشاركة</button>

</div>

</div>

<script>
let count = 0;

function add() {
  count++;
  document.getElementById("count").innerText = count;

  let flag = document.getElementById("flag");
  flag.style.bottom = (count * 10) + "px";
}
</script>

</body>
</html>
