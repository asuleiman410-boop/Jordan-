<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رفع العلم LIVE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  direction:rtl;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
}

.card{
  margin-top:40px;
  background:rgba(255,255,255,0.1);
  width:340px;
  margin-left:auto;
  margin-right:auto;
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(10px);
}

.counter{
  font-size:70px;
  margin:20px 0;
  font-weight:bold;
}

.pole{
  width:10px;
  height:320px;
  background:white;
  margin:auto;
  position:relative;
  border-radius:5px;
}

.flag{
  width:85px;
  position:absolute;
  bottom:0;
  left:-38px;
  transition:0.6s ease;
}

button{
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:#ffcc00;
  font-weight:bold;
}
button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="card">

<h2>🇯🇴 رفع العلم الأردني LIVE</h2>

<p>مدرسة أم ورقة الأنصارية الأساسية للبنات</p>
<p>لجنة النهوض الوطني</p>

<div class="counter" id="count">0</div>

<div class="pole">
  <img id="flag" class="flag"
  src="https://upload.wikimedia.org/wikipedia/commons/c/c0/Flag_of_Jordan.svg">
</div>

<button onclick="add()">إضافة مشاركة</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
https://jordan-flag-default-rtdb.asia-southeast1.firebasedatabase.app/
firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("count");

// عرض الرقم للجميع (Live)
db.on("value", (snap) => {
  let count = snap.val() || 0;
  document.getElementById("count").innerText = count;
  document.getElementById("flag").style.bottom = (count * 10) + "px";
});

// زيادة الرقم
function add() {
  db.transaction(function(current){
    return (current || 0) + 1;
  });
}
</script>

</body>
</html>
