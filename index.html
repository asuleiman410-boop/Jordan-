<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>رفع العلم الأردني</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(to bottom, black, white, #007a3d);
  overflow: hidden;
}

header {
  background: #c8102e;
  color: white;
  padding: 18px;
  font-size: 22px;
  font-weight: bold;
}

.counter {
  font-size: 22px;
  margin: 15px;
  color: #c8102e;
  font-weight: bold;
}

/* شريط التحميل */
.progress-bar {
  width: 70%;
  height: 14px;
  margin: 10px auto;
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.4);
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(to right, black, white, #007a3d, #c8102e);
  transition: width 0.4s ease;
}

/* زر */
button {
  padding: 12px 24px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #c8102e;
  color: white;
  cursor: pointer;
}

button:disabled {
  background: gray;
  cursor: not-allowed;
}

/* عمود العلم */
.flagpole {
  width: 8px;
  height: 320px;
  background: #555;
  margin: 30px auto;
  position: relative;
}

/* العلم */
.flag {
  width: 150px;
  height: 80px;
  position: absolute;
  left: 8px;
  bottom: 0;
  transition: 0.6s ease;
  overflow: hidden;
}

/* ألوان */
.stripe-black { height: 33.33%; background: black; }
.stripe-white { height: 33.33%; background: white; }
.stripe-green { height: 33.33%; background: #007a3d; }

/* مثلث */
.triangle {
  position: absolute;
  left: 0;
  top: 0;
  width: 65px;
  height: 80px;
  background: #c8102e;
  clip-path: polygon(0 0, 0 100%, 100% 50%);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* نجمة */
.star {
  width: 16px;
  height: 16px;
}

/* نصوص */
.school-name {
  margin-top: 20px;
  font-weight: bold;
}

.committee {
  color: #444;
}

/* ✔️ رسالة نجاح */
#success {
  display: none;
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 25px;
  border-radius: 12px;
  font-size: 20px;
  font-weight: bold;
  color: #007a3d;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<header>🇯🇴 فعالية رفع العلم الأردني 🇯🇴</header>

<div class="counter">
عدد المشاركات: <span id="count">0</span> / 1000
</div>

<div class="progress-bar">
<div class="progress-fill" id="progress"></div>
</div>

<button id="btn" onclick="raiseFlag()">شارك في رفع العلم</button>

<div class="flagpole">
  <div class="flag" id="flag">

    <div class="stripe-black"></div>
    <div class="stripe-white"></div>
    <div class="stripe-green"></div>

    <div class="triangle">
      <svg class="star" viewBox="0 0 100 100">
        <polygon fill="white" points="
          50,5 61,38 95,38 67,58 78,91
          50,70 22,91 33,58 5,38 39,38
        "/>
      </svg>
    </div>

  </div>
</div>

<div class="school-name">
مدرسة أم ورقة الأنصارية الأساسية للبنات
</div>

<div class="committee">
لجنة النهوض الوطني
</div>

<!-- رسالة النجاح -->
<div id="success">🎉 تم الوصول إلى 1000 مشاركة! 🇯🇴</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "flag", "counter");

const countEl = document.getElementById("count");
const flag = document.getElementById("flag");
const progress = document.getElementById("progress");
const btn = document.getElementById("btn");
const success = document.getElementById("success");

function updateUI(c) {
  countEl.innerText = c;
  flag.style.bottom = (c / 1000) * 240 + "px";
  progress.style.width = (c / 1000) * 100 + "%";

  if (c >= 1000) {
    btn.disabled = true;
    btn.innerText = "اكتمل رفع العلم 🇯🇴";
    success.style.display = "block";
  }
}

async function load() {
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, { count: 0 });
    updateUI(0);
  } else {
    updateUI(snap.data().count);
  }
}

async function raiseFlag() {
  try {
    await runTransaction(db, async (tx) => {
      const snap = await tx.get(ref);

      let current = snap.exists() ? snap.data().count : 0;

      if (current >= 1000) return;

      tx.set(ref, { count: current + 1 });
    });

    load();

  } catch (e) {
    console.error(e);
  }
}

window.raiseFlag = raiseFlag;

load();
</script>

</body>
</html>
