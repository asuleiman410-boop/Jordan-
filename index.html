<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رفع العلم الأردني LIVE</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  text-align:center;
  direction:rtl;
  color:white;

  /* 🏜️ بتراء */
  background-image:url("https://upload.wikimedia.org/wikipedia/commons/e/e7/Petra_Jordan_BW_21.jpg");
  background-size:cover;
  background-position:center;
  min-height:100vh;
}

.overlay{
  background:rgba(0,0,0,0.35);
  min-height:100vh;
  padding:20px;
}

.card{
  margin-top:40px;
  width:400px;
  max-width:92%;
  margin-inline:auto;
  padding:30px;
  border-radius:24px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
}

/* 🇯🇴 عنوان */
.title{
  font-size:26px;
  font-weight:bold;
  color:#ffcc00;
}

.sub1{margin:0;font-size:18px;}
.sub2{color:#ffcc00;font-size:16px;margin-bottom:15px;}

.counter{font-size:70px;font-weight:bold;}
#progressText{color:#ffcc00;}

.progress-container{
  width:100%;
  height:12px;
  background:rgba(255,255,255,0.25);
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(to right, red, green);
  transition:1s;
}

.pole{
  width:10px;
  height:300px;
  background:white;
  margin:20px auto;
  position:relative;
}

.flag{
  width:85px;
  position:absolute;
  bottom:0;
  left:-38px;
  transition:1s;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  margin:5px;
  font-weight:bold;
}

.addBtn{background:#ffcc00;}
.soundBtn{background:#1e88e5;color:white;}
</style>
</head>

<body>

<!-- 🎵 موسيقى خلفية -->
<audio id="bgMusic" loop>
  <source src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Jordanian_royal_anthem.ogg" type="audio/ogg">
</audio>

<div class="overlay">

<div class="card">

<div class="title">🇯🇴 ارفع علم الأردن معنا</div>

<p class="sub1">مدرسة أم ورقة الأنصارية الأساسية للبنات - لواء ماركا</p>
<p class="sub2">لجنة النهوض الوطني</p>

<div class="counter" id="count">0</div>
<div id="progressText">0 / 500</div>

<div class="progress-container">
  <div class="progress-bar" id="bar"></div>
</div>

<div class="pole">
  <img class="flag" id="flag"
  src="https://upload.wikimedia.org/wikipedia/commons/c/c0/Flag_of_Jordan.svg">
</div>

<button class="addBtn" onclick="add()">➕ إضافة مشاركة</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const firebaseConfig = {
  databaseURL: "https://flag-77368-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("count");

const MAX = 500;

let bgMusic = document.getElementById("bgMusic");
let musicStarted = false;

/* 🎵 تشغيل الموسيقى بعد أول تفاعل */
function startMusicOnce(){
  if(!musicStarted){
    bgMusic.volume = 0.4;
    bgMusic.play().catch(()=>{});
    musicStarted = true;
  }
}

/* تحديث */
db.on("value", (snap)=>{
  let count = snap.val() || 0;

  document.getElementById("count").innerText = count;
  document.getElementById("progressText").innerText = count + " / " + MAX;

  let height = (count / MAX) * 150;
  document.getElementById("flag").style.bottom = height + "px";

  let percent = (count / MAX) * 100;
  document.getElementById("bar").style.width = percent + "%";

  if(count >= MAX){
    confetti();
  }
});

/* ➕ إضافة + تشغيل الموسيقى تلقائي بعد أول ضغط */
function add(){

  startMusicOnce(); // 🎵 هنا التشغيل التلقائي الذكي

  db.transaction((current)=>{
    let v = current || 0;
    if(v >= MAX) return MAX;
    return v + 1;
  });
}
</script>

</body>
</html>
