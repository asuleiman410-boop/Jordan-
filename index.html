<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>رفع العلم - مدرسة أم ورقة الأنصارية الأساسية للبنات</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #dbeafe, #ffffff);
      overflow: hidden;
    }

    header {
      background: #c8102e;
      color: white;
      padding: 18px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      margin-top: 20px;
      padding: 20px;
    }

    .flagpole {
      width: 8px;
      height: 320px;
      background: #555;
      margin: 30px auto;
      position: relative;
      border-radius: 5px;
    }

    .flag {
      width: 140px;
      height: 80px;
      position: absolute;
      right: 8px;
      bottom: 0;
      transition: bottom 1s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .stripe-black { height: 33.33%; background: black; }
    .stripe-white { height: 33.33%; background: white; }
    .stripe-green { height: 33.33%; background: green; }

    .triangle {
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      border-top: 40px solid transparent;
      border-bottom: 40px solid transparent;
      border-right: 60px solid #c8102e;
      z-index: 2;
    }

    .counter {
      font-size: 22px;
      margin: 20px 0;
      font-weight: bold;
      color: #c8102e;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #c8102e;
      color: white;
      cursor: pointer;
    }

    .school-name {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .committee {
      font-size: 18px;
      margin-top: 8px;
      color: #444;
    }
  </style>
</head>
<body>

  <header>🇯🇴 فعالية رفع العلم الأردني 🇯🇴</header>

  <div class="container">
    <div class="counter">
      عدد المشاركات: <span id="count">0</span> / 1000
    </div>

    <button onclick="raiseFlag()">شارك في رفع العلم</button>

    <div class="flagpole">
      <div class="flag" id="flag">
        <div class="triangle"></div>
        <div class="stripe-black"></div>
        <div class="stripe-white"></div>
        <div class="stripe-green"></div>
      </div>
    </div>

    <div class="school-name">
      مدرسة أم ورقة الأنصارية الأساسية للبنات
    </div>

    <div class="committee">
      لجنة النهوض الوطني
    </div>
  </div>

  <script>
    let count = parseInt(localStorage.getItem("flagCount")) || 0;

    document.getElementById("count").innerText = count;

    function updateFlag() {
      let height = (count / 1000) * 240;
      document.getElementById("flag").style.bottom = height + "px";
    }

    updateFlag();

    function raiseFlag() {
      if (count < 1000) {
        count++;
        localStorage.setItem("flagCount", count);

        document.getElementById("count").innerText = count;
        updateFlag();
      }

      if (count === 1000) {
        alert("🇯🇴 اكتمل رفع العلم بـ 1000 مشاركة!");
      }
    }
  </script>

</body>
</html>
